<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Login</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="stylesheet" href="assets/styles/mediaqueries.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <main>
        <section class="login">
            <div class="imagem-login"></div>
            <div class="login-group">
                <div class="login-title">
                    <h1>Login</h1>
                    <p>
                        Bem vindo!<br>
                        Faça login para entrar!
                    </p>
                </div>
                <form class="inputs-group" method="post">
                    <div class="input-box">
                            <div class="input-span">
                                <span class="material-symbols-outlined">account_circle</span>
                                <input type="email" name="email" id="id-email" required max="50" placeholder="Email">
                            </div>
                            <div class="input-span">
                                <span class="material-symbols-outlined">passkey</span>
                                <input type="password" name="emai" id="" required minlength="8" maxlength="16" placeholder="Senha">
                            </div>
                    </div>
                    <div class="buttons-form">
                        <input class="button" type="submit" value="Entrar">
                        <input class="button" type="button" value="Esqueci minha senha!">
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
